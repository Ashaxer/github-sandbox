name: Download from Commit & Save to Repo
on:
  push:
    branches:
      - "**"
jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install aria2 and depencies
        run: sudo apt-get install -y aria2 python3-pip && pip install -U yt-dlp

      - name: Restore cookies
        run: |
          echo "${{ secrets.YTDLP_COOKIES }}" > cookies.txt
    
      - name: Extract URLs and download files
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          echo "Displaying cookies... for debugging ofc"
          cat cookies.txt
          echo "[end of cookies file]"
          
          MODE=""
          URL_LINE=""
          
          if echo "$MSG" | grep -qP 'download-video-[0-9]+p:'; then
            MODE="video_quality"
            QUALITY=$(echo "$MSG" | grep -oP 'download-video-\K[0-9]+(?=p)')
            URL_LINE=$(echo "$MSG" | grep -oP 'download-video-[^:]+:\s*\K.*')
          
          elif echo "$MSG" | grep -qP 'download-video:'; then
            MODE="video"
            URL_LINE=$(echo "$MSG" | grep -oP 'download-video:\s*\K.*')
          
          elif echo "$MSG" | grep -qP 'download:'; then
            MODE="normal"
            URL_LINE=$(echo "$MSG" | grep -oP 'download:\s*\K.*')
            
          elif echo "$MSG" | grep -qP 'download-[0-9]+-(?:[0-9]+|END):'; then
            MODE="normal_parted"
            START_BYTE=$(echo "$MSG" | grep -oP '^download-\K\d+')
            END_BYTE=$(echo "$MSG" | grep -oP '^download-\d+-\K(?:\d+|END)')
            URL_LINE=$(echo "$MSG" | grep -oP 'download-[^:]+:\s*\K.*')
          
          else
            echo "âťŚ No download command found in commit message"
            exit 1
          fi
          echo "Mode: $MODE"

          mkdir -p downloads tmp_downloads

          for URL in $URL_LINE; do
            DOMAIN=$(echo "$URL" | awk -F/ '{print $3}')
            FILENAME=$(basename "$URL")
            echo "â¬‡ď¸Ź Processing $URL"

            if [[ "$MODE" == video* ]]; then
              echo "đźŽ¬ Using yt-dlp with headers for $DOMAIN"

              FORMAT="b"
              
              if [ "$MODE" = "video_quality" ]; then
                FORMAT="bestvideo[height<=${QUALITY}]+bestaudio/best[height<=${QUALITY}]"
              fi
              
              yt-dlp \
                --add-header "User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
                --add-header "Referer: https://$DOMAIN/" \
                -f "$FORMAT" \
                --cookies cookies.txt \
                -o "tmp_downloads/%(title)s.%(ext)s" \
                "$URL"
            elif [ "$MODE" = "normal_parted" ]; then
              echo "đź“¦ Using aria2 parted"
              
              if [ "$END_BYTE" = "END" ]; then
                RANGE="bytes=$START_BYTE-"
              else
                RANGE="bytes=$START_BYTE-$END_BYTE"
              fi
              
              aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --header="Range: bytes=$START_BYTE-$END_BYTE" \
                --min-split-size=90M \
                --dir="tmp_downloads" \
                -o "$FILENAME.SPLIT-$START_BYTE-$END_BYTE" \
                "$URL"
            else
              echo "đź“¦ Using aria2"

              aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=90M \
                --dir="tmp_downloads" \
                "$URL"
            fi
          done

          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="tmp_downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
            zip -j "$ARCHIVE_NAME" tmp_downloads/*
          fi

          # Split any file over 90MB. Files > 9GB use in-place truncation to save disk space.
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
          
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))       # 90 MB
            NINE_GB=$((9 * 1024 * 1024 * 1024)) # 9 GB
            BASENAME=$(basename "$FILE")
          
            # sanitize name for safety
            SAFE_NAME=$(echo "$BASENAME" | tr ' ' '_' | tr -cd '[:alnum:]_.-')
          
            if [ "$SIZE" -gt "$NINE_GB" ]; then
              echo "âš ď¸Ź $BASENAME is $(( SIZE / 1024 / 1024 / 1024 ))GB â€” extreme split (truncate from end)..."
              echo "MD5SUM: $(md5sum "$FILE")"
              
              PART_SIZE=$LIMIT
              FILE_SIZE=$SIZE
              PART_NUM=1
          
              while [ "$FILE_SIZE" -gt 0 ]; do
                if [ "$FILE_SIZE" -gt "$PART_SIZE" ]; then
                  READ_SIZE=$PART_SIZE
                  SKIP_BYTES=$((FILE_SIZE - PART_SIZE))
                else
                  READ_SIZE=$FILE_SIZE
                  SKIP_BYTES=0
                fi
                
                PART_NAME=$(printf "downloads/%s.part_%03d.bin" "$SAFE_NAME" "$PART_NUM")
                echo "   -> Creating $(basename "$PART_NAME") ($((READ_SIZE / 1024 / 1024))MB)..."
          
                # Read exact bytes fast using GNU dd
                dd if="$FILE" of="$PART_NAME" bs=4M skip="$SKIP_BYTES" count="$READ_SIZE" iflag=skip_bytes,count_bytes status=none
                
                # Truncate file to free up space
                truncate -s "$SKIP_BYTES" "$FILE"
          
                FILE_SIZE=$SKIP_BYTES
                PART_NUM=$((PART_NUM + 1))
              done
              
              # Remove the remaining empty source file just in case
              rm -f "$FILE"
              echo "âś… Extreme split complete. Parts: $(ls -1 downloads/${SAFE_NAME}.part_*.bin 2>/dev/null | wc -l)"
          
            elif [ "$SIZE" -gt "$LIMIT" ]; then
              echo "âś‚ď¸Ź $BASENAME is $(( SIZE / 1024 / 1024 ))MB â€” splitting with zip..."
          
              zip -0 -s 90m "downloads/${SAFE_NAME}.zip" -j "$FILE"
          
              echo "âś… Parts: $(find downloads -name "${SAFE_NAME}.z*" | wc -l)"
          
              rm "$FILE"
            else
              cp "$FILE" "downloads/$SAFE_NAME"
            fi
          done


          rm -rf tmp_downloads
      - name: Commit & Push in batches of 5 files
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Collect all new/untracked files under downloads/
          # mapfile -t ALL_FILES < <(git ls-files --others --modified --exclude-standard downloads/)
          mapfile -d '' ALL_FILES < <(find downloads -type f -print0)

          TOTAL=${#ALL_FILES[@]}
          echo "đź“¦ Total files to push: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit"
            exit 0
          fi

          BATCH_SIZE=5
          BATCH_NUM=0

          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")

            echo "đźš€ Pushing batch $BATCH_NUM: files $((i+1))â€“$(( i + ${#BATCH[@]} )) of $TOTAL"

            git add "${BATCH[@]}"
            git commit -m "Add downloaded files â€” batch $BATCH_NUM [skip ci]"

            # Pull with rebase before each push to avoid conflicts from prior batches
            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"

            echo "âś… Batch $BATCH_NUM pushed"
          done

          echo "đźŽ‰ All $TOTAL files pushed in $BATCH_NUM batch(es)"
