name: Download from Commit & Save to Repo
on:
  push:
    branches:
      - "**"
jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install aria2 and depencies
        run: sudo apt-get install -y aria2 python3-pip && pip install -U yt-dlp

      - name: Extract URLs and download files
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          MODE=""
          URL_LINE=""
          DOMAIN=""

          if echo "$MSG" | grep -qP 'download-video-[0-9]+p-[^:]+:'; then
            MODE="video_quality"
            QUALITY=$(echo "$MSG" | grep -oP 'download-video-\K[0-9]+(?=p-)')
            DOMAIN=$(echo "$MSG" | grep -oP 'download-video-[0-9]+p-\K[^:]+')
          
            URL_LINE=$(echo "$MSG" | grep -oP 'download-video-[^:]+:\s*\K.*')
          
          elif echo "$MSG" | grep -qP 'download-video-[^:]+:'; then
            MODE="video"
            DOMAIN=$(echo "$MSG" | grep -oP 'download-video-\K[^:]+')
            URL_LINE=$(echo "$MSG" | grep -oP 'download-video-[^:]+:\s*\K.*')

          elif echo "$MSG" | grep -qP 'download-video-[^:]+:'; then
            MODE="video"
            DOMAIN=$(echo "$MSG" | grep -oP 'download-video-\K[^:]+')
            URL_LINE=$(echo "$MSG" | grep -oP 'download-video-[^:]+:\s*\K.*')

          elif echo "$MSG" | grep -qP 'download:'; then
            MODE="normal"
            URL_LINE=$(echo "$MSG" | grep -oP 'download:\s*\K.*')

          else
            echo "❌ No download command found in commit message"
            exit 1
          fi

          echo "Mode: $MODE"
          [ -n "$DOMAIN" ] && echo "Domain: $DOMAIN"

          mkdir -p downloads tmp_downloads

          for URL in $URL_LINE; do
            FILENAME=$(basename "$URL")
            echo "⬇️ Processing $URL"

            if [ "$MODE" = "video" ]; then
              echo "🎬 Using yt-dlp with headers for $DOMAIN"

            FORMAT="best"
            
            if [ "$MODE" = "video_quality" ]; then
              FORMAT="bestvideo[height<=${QUALITY}]+bestaudio/best[height<=${QUALITY}]"
            fi
            
            yt-dlp \
              --add-header "User-Agent: Mozilla/5.0" \
              --add-header "Referer: https://$DOMAIN/" \
              -f "$FORMAT" \
              -o "tmp_downloads/%(title)s.%(ext)s" \
              "$URL"

            else
              echo "📦 Using aria2"

              aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=90M \
                --dir="tmp_downloads" \
                "$URL"
            fi
          done

          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="tmp_downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
            zip -j "$ARCHIVE_NAME" tmp_downloads/*
          fi

          # Split any file over 90MB using zip native split
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
          
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))
            BASENAME=$(basename "$FILE")
          
            # sanitize name for zip output safety
            SAFE_NAME=$(echo "$BASENAME" | tr ' ' '_' | tr -cd '[:alnum:]_.-')
          
            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting with zip..."
          
              zip -0 -s 90m "downloads/${SAFE_NAME}.zip" -j "$FILE"
          
              echo "✅ Parts: $(find downloads -name "${SAFE_NAME}.z*" | wc -l)"
          
              rm "$FILE"
            else
              cp "$FILE" "downloads/$SAFE_NAME"
            fi
          done

          rm -rf tmp_downloads
      - name: Commit & Push in batches of 5 files
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Collect all new/untracked files under downloads/
          # mapfile -t ALL_FILES < <(git ls-files --others --modified --exclude-standard downloads/)
          mapfile -d '' ALL_FILES < <(find downloads -type f -print0)

          TOTAL=${#ALL_FILES[@]}
          echo "📦 Total files to push: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit"
            exit 0
          fi

          BATCH_SIZE=5
          BATCH_NUM=0

          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")

            echo "🚀 Pushing batch $BATCH_NUM: files $((i+1))–$(( i + ${#BATCH[@]} )) of $TOTAL"

            git add "${BATCH[@]}"
            git commit -m "Add downloaded files — batch $BATCH_NUM [skip ci]"

            # Pull with rebase before each push to avoid conflicts from prior batches
            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"

            echo "✅ Batch $BATCH_NUM pushed"
          done

          echo "🎉 All $TOTAL files pushed in $BATCH_NUM batch(es)"
